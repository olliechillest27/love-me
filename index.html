<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>For Pheven 💌</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: black;
  color: white;
  overflow: hidden;
}

/* soft flowers background */
.flowers {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 20% 30%, rgba(255,0,0,0.2), transparent 40%),
              radial-gradient(circle at 70% 60%, rgba(255,255,255,0.08), transparent 50%);
  animation: float 10s infinite alternate ease-in-out;
}

@keyframes float {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

.container {
  position: relative;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
}

.paper {
  background: #f5f5f5;
  color: black;
  padding: 30px;
  border-radius: 12px;
  width: 90%;
  max-width: 500px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  transition: all 0.8s ease;
}

h1 {
  font-weight: 600;
  margin-bottom: 20px;
}

p {
  font-weight: 300;
  line-height: 1.6;
}

.btn {
  margin-top: 20px;
  padding: 12px 20px;
  border: none;
  background: black;
  color: white;
  border-radius: 30px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: red;
}

.fade {
  opacity: 0;
  transform: scale(0.95);
  transition: 0.8s;
}

.hidden {
  display: none;
}

.iphone-slide {
  animation: slideUp 1s ease forwards;
}

@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.love-btn {
  margin-top: 15px;
  background: red;
}
</style>
</head>
<body>

<div class="flowers"></div>

<div class="container">

  <!-- First Letter -->
  <div id="step1" class="paper">
    <h1>To Pheven 💖</h1>
    <p>
      I feel like the luckiest person alive to have you in my life.
      Every second with you feels like heaven, like the world slows down
      just for us. I love you from the deepest part of my heart.
    </p>
    <button class="btn" onclick="nextStep()">Next</button>
  </div>

  <!-- Second Page -->
  <div id="step2" class="paper hidden">
    <h1 class="iphone-slide">💫 Your Lover, Ollie</h1>
    <p class="iphone-slide">
      Loves you endlessly... and falls in love with your eyes every single day.
    </p>
    <button class="btn love-btn" onclick="finalStep()">❤️ Love</button>
  </div>

</div>

<script>
function nextStep() {
  document.getElementById('step1').classList.add('fade');
  setTimeout(() => {
    document.getElementById('step1').classList.add('hidden');
    document.getElementById('step2').classList.remove('hidden');
    document.getElementById('step2').classList.add('iphone-slide');
  }, 600);
}

function finalStep() {
  document.body.innerHTML = `
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:black;color:white;text-align:center;flex-direction:column;">
      <h1 style="font-size:2rem;">💖 It’s just you & me now, Pheven</h1>
      <p style="margin-top:10px;opacity:0.8;">Forever starts here...</p>
    </div>
  `;
}
</script>

</body>
</html>
