<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Pheven ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    overflow-x: hidden;
}

/* Soft fade animation */
.fade-in {
    animation: fadeIn 1.5s ease forwards;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}

.container {
    padding: 40px 20px;
}

/* Buttons */
button {
    padding: 14px 26px;
    margin: 10px;
    border-radius: 30px;
    border: 1px solid white;
    background: transparent;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.4s ease;
}

button:hover {
    background: rgba(255,255,255,0.1);
}

.option-btn.active {
    background: #ff1a1a;
    border-color: #ff1a1a;
    box-shadow: 0 0 15px rgba(255,0,0,0.6);
}

/* Letter box */
.letter {
    display: none;
    margin-top: 30px;
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    animation: fadeIn 1.5s ease;
    line-height: 1.6;
}

/* Old style */
.old-letter {
    background: #f5e6cc;
    color: #2b1d0e;
    font-family: 'Dancing Script', cursive;
    font-size: 22px;
    border: 2px solid #c9a86a;
    box-shadow: 0 0 30px rgba(255, 200, 150, 0.3);
}

/* Modern romantic */
.modern-letter {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.2);
    font-size: 18px;
}

/* Flowers */
.flowers {
    font-size: 26px;
    margin: 10px 0;
}

/* Next button */
.next-btn {
    display: none;
    margin-top: 20px;
    border: none;
    background: #ff1a1a;
    color: white;
    border-radius: 30px;
    padding: 12px 25px;
    transition: 0.4s;
}

.next-btn:hover {
    box-shadow: 0 0 20px red;
}

/* Big love text */
.big-text {
    display: none;
    font-size: 42px;
    font-weight: 600;
    margin-top: 60px;
    animation: fadeIn 2s ease;
}

/* Final message */
.final-message {
    display: none;
    font-size: 22px;
    margin-top: 40px;
    opacity: 0;
    animation: fadeFinal 6s ease forwards;
}

@keyframes fadeFinal {
    0% {opacity: 0;}
    20% {opacity: 1;}
    80% {opacity: 1;}
    100% {opacity: 0;}
}
</style>
</head>

<body>

<div class="container fade-in" id="main">
    <h2 style="font-weight:600;">Choose one, Pheven… ❤️</h2>

    <button class="option-btn" id="btn1" onclick="chooseOption(1)">1</button>
    <button class="option-btn" id="btn2" onclick="chooseOption(2)">2</button>

    <div id="letter" class="letter"></div>

    <button id="nextBtn" class="next-btn" onclick="nextStep()">Next</button>

    <div id="bigText" class="big-text">I love you, my darling ❤️</div>

    <div id="finalMessage" class="final-message">
        Your lover Ollie loves you and falls in love with your eyes every day
    </div>
</div>

<script>
function chooseOption(option) {
    const btn1 = document.getElementById("btn1");
    const btn2 = document.getElementById("btn2");
    const letter = document.getElementById("letter");
    const nextBtn = document.getElementById("nextBtn");

    btn1.classList.remove("active");
    btn2.classList.remove("active");

    if(option === 1){
        btn1.classList.add("active");

        letter.className = "letter old-letter fade-in";
        letter.innerHTML = `
        <div class="flowers">🌹🌸💐🌺🌷🌼</div>
        <p>
        <b>My dearest Pheven,</b><br><br>
        From the moment you walked into my life, everything became softer… calmer… more beautiful.  
        <br><br>
        You feel like a dream I never want to wake up from.  
        A kind of love people search for their whole lives.  
        <br><br>
        If forever had a meaning… it would be you.  
        <br><br>
        <b>Yours, always.</b>
        </p>
        <div class="flowers">🌹🌸💐🌺🌷🌼</div>
        `;
    } else {
        btn2.classList.add("active");

        letter.className = "letter modern-letter fade-in";
        letter.innerHTML = `
        <p>
        <b>My Pheven,</b><br><br>
        I don’t think you understand how special you are to me.  
        Not just beautiful… but the kind of beautiful that stays in my mind all day.  
        <br><br>
        Your eyes… they pull me in every single time.  
        Like I fall in love again… and again… and again.  
        <br><br>
        I feel lucky. Truly lucky.  
        Because somehow… I got you.  
        <br><br>
        <b>And I will always choose you.</b>
        </p>
        `;
    }

    letter.style.display = "block";
    nextBtn.style.display = "inline-block";
}

function nextStep(){
    const main = document.getElementById("main");
    main.style.transition = "opacity 1.5s ease";
    main.style.opacity = "0";

    setTimeout(() => {
        document.getElementById("letter").style.display = "none";
        document.getElementById("nextBtn").style.display = "none";

        const bigText = document.getElementById("bigText");
        bigText.style.display = "block";

        main.style.opacity = "1";

        setTimeout(() => {
            bigText.style.opacity = "0";

            setTimeout(() => {
                bigText.style.display = "none";

                const finalMsg = document.getElementById("finalMessage");
                finalMsg.style.display = "block";
            }, 1000);

        }, 3000);

    }, 1500);
}
</script>

</body>
</html>
